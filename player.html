<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F5F5F2" media="(prefers-color-scheme: light)">
<title>ScoreFrame — Player</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg-deepest: #0D0D0D; --bg-deep: #141414; --bg-surface: #1E1E1E;
    --bg-elevated: #272727; --accent: #FF9640; --accent-dim: rgba(255,150,64,0.15);
    --text-primary: #E0E0E0; --text-secondary: #999; --text-muted: #666;
    --success: #4CAF50; --error: #F44336;
    --win-green: #2E7D32; --loss-red: #C62828; --tie-grey: #777777;
}
body[data-theme="dark"] {
    --bg-deepest: #0D0D0D !important; --bg-deep: #141414 !important; --bg-surface: #1E1E1E !important;
    --bg-elevated: #272727 !important; --accent: #FF9640 !important; --accent-dim: rgba(255,150,64,0.15) !important;
    --text-primary: #E0E0E0 !important; --text-secondary: #999 !important; --text-muted: #666 !important;
    --win-green: #2E7D32 !important; --loss-red: #C62828 !important; --tie-grey: #777777 !important;
}
body[data-theme="light"] {
    --bg-deepest: #F5F5F2 !important; --bg-deep: #FFFFFF !important; --bg-surface: #FFFFFF !important;
    --bg-elevated: #ECECE8 !important; --accent: #E47A1F !important; --accent-dim: rgba(228,122,31,0.15) !important;
    --text-primary: #1A1A1A !important; --text-secondary: #555 !important; --text-muted: #888 !important;
    --win-green: #1B5E20 !important; --loss-red: #B71C1C !important; --tie-grey: #888888 !important;
}
@media (prefers-color-scheme: light) {
    :root {
        --bg-deepest: #F5F5F2; --bg-deep: #FFFFFF; --bg-surface: #FFFFFF;
        --bg-elevated: #ECECE8; --accent: #E47A1F; --accent-dim: rgba(228,122,31,0.15);
        --text-primary: #1A1A1A; --text-secondary: #555; --text-muted: #888;
        --win-green: #1B5E20; --loss-red: #B71C1C; --tie-grey: #888888;
    }
}
body.app .top-bar { display: none; }
html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-deepest); color: var(--text-primary);
    min-height: 100vh; overflow-x: hidden;
}

/* Top bar — slim brand + back link (hidden in-app) */
.top-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--bg-deep);
    border-bottom: 1px solid var(--bg-elevated);
}
.brand { text-decoration: none; font-size: 1.1rem; font-weight: 800; color: var(--text-primary); }
.brand .accent { color: var(--accent); }
.back-link {
    margin-left: auto; font-size: 13px; color: var(--text-secondary);
    text-decoration: none; padding: 6px 12px; border-radius: 6px;
    border: 1px solid var(--bg-elevated);
}

/* Hero — large faded sport-emoji watermark behind player name */
.hero { position: relative; padding: 22px 24px 16px; text-align: center; overflow: hidden; }
.hero-watermark {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-12deg);
    font-size: 220px; opacity: 0.06; pointer-events: none;
    line-height: 1;
}
.hero-name {
    position: relative; font-size: 26px; font-weight: 800;
    letter-spacing: 0.02em; margin-bottom: 4px;
}
.hero-meta {
    position: relative; font-size: 13px; color: var(--text-muted);
}

/* Sport pill row */
.section { padding: 8px 16px 0; }
.pills {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 4px 0 12px; scrollbar-width: none;
}
.pills::-webkit-scrollbar { display: none; }
.pill {
    flex: 0 0 auto; padding: 7px 14px; border-radius: 18px;
    font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    border: 1px solid var(--accent); background: transparent; color: var(--accent);
    transition: background 0.12s ease;
}
.pill.selected { background: var(--accent); color: #1A1A1A; }

/* Season picker */
.season-select {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    background: var(--bg-surface); border: 1px solid var(--bg-elevated);
    color: var(--text-primary); font-size: 13px; font-weight: 600;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23FF9640' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 36px;
}
.section-label {
    font-size: 11px; font-weight: 700; color: var(--text-secondary);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin: 14px 0 8px;
}

/* Stat card */
.stat-card {
    margin: 12px 16px; padding: 16px 18px;
    background: var(--bg-surface); border: 2px solid var(--accent);
    border-radius: 14px;
}
.stat-card-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
}
.stat-card-head .emoji { font-size: 28px; }
.stat-card-head .who {
    font-size: 16px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
}
.stat-card-head .games { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.stat-divider {
    height: 2px; background: var(--accent); margin: 4px 0 14px;
}
.big-row { display: flex; gap: 8px; }
.big-stat {
    flex: 1; text-align: center;
}
.big-stat .v {
    display: block; font-size: 22px; font-weight: 800; color: var(--accent);
    line-height: 1.1;
}
.big-stat .l {
    display: block; font-size: 10px; color: var(--text-secondary);
    letter-spacing: 0.08em; margin-top: 4px;
}
.stat-grid {
    display: grid; gap: 6px 8px; margin-top: 12px;
}
.stat-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.stat-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }
.stat-cell { text-align: center; padding: 4px 0; }
.stat-cell .v {
    display: block; font-size: 15px; font-weight: 700; color: var(--text-primary);
}
.stat-cell .l {
    display: block; font-size: 9px; color: var(--text-secondary);
    letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px;
}
.record-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px;
}
.record-row .l {
    font-size: 10px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase;
}
.record-row .v {
    font-size: 14px; font-weight: 800;
}

/* Trend chart */
.trend-wrap {
    position: relative; /* anchor for the calculating overlay */
    margin: 8px 16px 0; padding: 12px;
    background: var(--bg-surface); border: 1px solid var(--bg-elevated);
    border-radius: 10px;
}
.trend-canvas { display: block; width: 100%; height: 110px; }
/* "Calculating…" overlay — covers the canvas + footer while we're
   still extracting per-game scores from the participants. Removed
   the moment drawTrend completes. */
.trend-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-surface); border-radius: 10px;
    color: var(--text-secondary); font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    transition: opacity 0.18s ease;
}
.trend-loading.hidden { opacity: 0; pointer-events: none; }
.trend-loading .dots::after {
    display: inline-block; content: '…'; width: 1.2em; text-align: left;
    animation: trendDots 1.2s steps(4, end) infinite;
}
@keyframes trendDots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
}
.trend-footer {
    display: flex; align-items: center; gap: 14px; padding: 4px 4px 0;
    font-size: 10px; font-weight: 700; color: var(--text-secondary);
    letter-spacing: 0.04em; text-transform: uppercase;
}
.trend-footer .high { color: var(--accent); }
.trend-footer .games { margin-left: auto; }

/* Past game cards (read-only) */
.games-list { padding: 0 16px 32px; }
.past-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-surface); border: 1px solid var(--bg-elevated);
    border-radius: 10px; padding: 12px; margin-bottom: 8px;
}
.past-card .emoji { font-size: 22px; }
.past-card .body { flex: 1; min-width: 0; }
.past-card .title {
    font-size: 14px; font-weight: 700; color: var(--text-primary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.past-card .sub {
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.past-card .badge {
    flex: 0 0 auto; font-size: 11px; font-weight: 800;
    padding: 4px 8px; border-radius: 999px; color: white;
    min-width: 28px; text-align: center;
}
.past-card .badge.W { background: var(--win-green); }
.past-card .badge.L { background: var(--loss-red); }
.past-card .badge.T { background: var(--tie-grey); }
.not-counted-pill {
    display: inline-block; font-size: 9px; font-weight: 800;
    color: var(--text-muted); margin-left: 6px;
    letter-spacing: 0.06em; text-transform: uppercase;
}
/* Untracked sessions stay in the list (Eric: still want to see them)
   but render dimmer so the eye separates them from the games that
   actually fed the stats above. */
.past-card.muted {
    opacity: 0.45;
    background: transparent;
}
.past-card.muted .title { font-weight: 500; }

/* Version footer — tiny build marker so Eric can verify
   he's looking at the deployed version without opening
   dev tools. */
.version-footer {
    text-align: center; padding: 16px 16px 28px;
    font-size: 10px; color: var(--text-muted);
    letter-spacing: 0.06em; text-transform: uppercase;
    opacity: 0.7;
}

/* Empty + loading states */
.center-state {
    padding: 60px 24px; text-align: center; color: var(--text-secondary);
}
.center-state .emoji { font-size: 36px; margin-bottom: 12px; }
.center-state .h { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.center-state .d { font-size: 12px; }
</style>
</head>
<body data-theme="dark">

<div class="top-bar">
    <a href="/" class="brand">Score<span class="accent">Frame</span></a>
    <a href="javascript:history.back()" class="back-link" id="backLink">← Back</a>
</div>

<div id="loadingScreen" class="center-state">
    <div class="emoji">⏳</div>
    <div class="h">Loading player…</div>
</div>

<div id="notFoundScreen" class="center-state" style="display:none;">
    <div class="emoji">🔒</div>
    <div class="h" id="notFoundTitle">Player not found</div>
    <div class="d" id="notFoundDesc">This player isn't on this team or hasn't been added yet.</div>
    <button id="signInBtn" onclick="window.__doGoogleSignIn()" style="
        display:none; margin-top: 16px; padding: 10px 22px;
        border: none; border-radius: 999px; background: var(--accent);
        color: #1A1A1A; font-size: 13px; font-weight: 800;
        letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer;
    ">Sign in with Google</button>
</div>

<div id="playerPage" style="display:none;">
    <div class="hero">
        <div class="hero-watermark" id="heroWatermark"></div>
        <div class="hero-name" id="heroName"></div>
        <div class="hero-meta" id="heroMeta"></div>
    </div>

    <!-- 2026-06-02 — Team picker. Renders ABOVE sport pills when the
         visitor lands on this page without a specific team context
         (e.g. from the My Players list in the app), or when the app
         explicitly passes the player's team list via `?teams=`.
         Hidden when only one team is known — the URL's `team` param
         then drives the scope unconditionally. -->
    <div id="teamSection" class="section" style="display:none;">
        <div class="section-label">Team</div>
        <select id="teamSelect" class="season-select"></select>
        <div id="teamDiscoveryStatus" style="font-size:11px;color:var(--text-muted);margin-top:6px;"></div>
    </div>

    <div class="section">
        <div class="pills" id="pillsRow"></div>
    </div>

    <div id="seasonSection" class="section" style="display:none;">
        <div class="section-label">Season</div>
        <select id="seasonSelect" class="season-select"></select>
    </div>

    <div id="statCardSlot"></div>

    <div id="trendSlot" style="display:none;">
        <div class="section-label" style="padding: 0 16px;">Trend</div>
        <div class="trend-wrap">
            <canvas id="trendCanvas" class="trend-canvas"></canvas>
            <div class="trend-footer">
                <span class="high" id="trendHigh"></span>
                <span id="trendAvg"></span>
                <span class="games" id="trendGameCount"></span>
            </div>
            <!-- Calculating overlay — shown while the per-game score
                 extraction is still running, hidden once drawTrend
                 paints. Eric: "the trend takes a while to show up,
                 can we put a 'calculating...' animation". -->
            <div class="trend-loading" id="trendLoading">
                <span>Calculating<span class="dots"></span></span>
            </div>
        </div>
    </div>

    <div id="gamesSection">
        <div class="section-label" style="padding: 14px 16px 4px;">Game History</div>
        <div class="games-list" id="gamesList"></div>
    </div>
</div>

<!-- Build marker. Eric: "put a version at the bottom of the page so
     I know if we're hitting the right version." Bump the date/letter
     suffix on every push so the visible text is the source of truth
     for "is this the latest" without opening dev tools. -->
<div class="version-footer">build 2026-06-02q</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
    getAuth, onAuthStateChanged, signInWithCustomToken,
    GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
    getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, limit
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// 2026-06-02 — Must match team.html / game.html exactly. Same project +
// same appId means same Firebase Auth storage key in IndexedDB, so when
// you sign in on team.html the session is visible here without
// re-authenticating. Previously this file shipped with the web-app
// API key and `appId` ending in `:web:`, while team.html uses the
// android client's `:android:` appId — Firebase treats those as
// separate apps and segregates auth state.
const firebaseConfig = {
    apiKey: "AIzaSyBhqtlHshe3wEEPkJe7mVUIrZ1IJirullU",
    authDomain: "scoreframe-deploy.firebaseapp.com",
    databaseURL: "https://scoreframe-deploy-default-rtdb.firebaseio.com",
    projectId: "scoreframe-deploy",
    storageBucket: "scoreframe-deploy.firebasestorage.app",
    messagingSenderId: "728886280072",
    appId: "1:728886280072:android:0050478669b89fc76b043d"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

console.log('[player.html] build 2026-06-02q loaded');

// 2026-06-02 — Google sign-in for when the visitor lands on this page
// without an auth session. Safari/Chrome opened from an in-app link
// won't carry your iOS/Android Firebase session unless you also signed
// into Google in the browser. Trigger from the "Sign in with Google"
// button on the notFound screen.
const googleProvider = new GoogleAuthProvider();
const _isIOSorSafari = /iP(hone|ad|od)/i.test(navigator.userAgent)
    || (/Safari/i.test(navigator.userAgent) && !/Chrome/i.test(navigator.userAgent));
window.__doGoogleSignIn = async function() {
    try {
        if (_isIOSorSafari) {
            // Safari blocks the popup auth-handler postMessage; redirect
            // back to the same URL after sign-in.
            await signInWithRedirect(auth, googleProvider);
            return;
        }
        await signInWithPopup(auth, googleProvider);
        // onAuthStateChanged below will re-fire and retry loadPlayer.
    } catch (e) {
        console.error('[player.html] sign-in failed:', e);
        if (e.code === 'auth/popup-blocked'
            || e.code === 'auth/operation-not-supported-in-this-environment') {
            try { await signInWithRedirect(auth, googleProvider); return; } catch (_) {}
        }
    }
};
// Pick up the post-redirect session on the next page load.
getRedirectResult(auth).catch((e) => console.warn('[player.html] redirect-result:', e));

// ── URL params ──
// Only `player=` is required. `team=` is an optional default scope
// — pick the team to show first when the viewer can see this player
// on multiple teams. The Team picker always discovers every team
// the signed-in viewer is allowed to read that has this player on
// its roster, regardless of what `team=` says. If `team=` is
// missing entirely, the first discovered team is selected.
const params = new URLSearchParams(location.search);
let hubCode = params.get('team') || '';
const playerIdParam = params.get('player') || '';
const teamHubCodes = []; // populated by discoverTeamsForPlayer()
const themeParam = params.get('theme');
if (themeParam === 'light' || themeParam === 'dark') {
    document.body.setAttribute('data-theme', themeParam);
}
if (params.get('app') === '1') document.body.classList.add('app');

let teamId = '';
let playerProfile = null;
let currentUid = null;  // module-scoped; discovery + picker read this
let allGames = [];        // GameSummary-shaped docs filtered to this player
let teamProfile = null;   // { name, sport, color, color2 }
let teamSeasons = [];     // [{ id, name, startDate, isActive, teamId }]
let selectedSport = '';
let selectedSeasonId = '__ALL__';

const $ = (id) => document.getElementById(id);

// ── Sport helpers ──
const SPORT_EMOJI = {
    BOWLING: '🎳', VOLLEYBALL: '🏐', BASEBALL: '⚾', SOFTBALL: '🥎',
    BASKETBALL: '🏀', FOOTBALL: '🏈', SOCCER: '⚽', HOCKEY: '🏒',
    LACROSSE: '🥍', TENNIS: '🎾', PICKLEBALL: '🏓'
};
const sportEmoji = (s) => SPORT_EMOJI[String(s).toUpperCase()] || '🏆';
const sportLabel = (s) => {
    const u = String(s).toLowerCase();
    return u.charAt(0).toUpperCase() + u.slice(1);
};

// ── Boot ──
// Only playerId is required. team is optional — when missing, we
// seed it from the viewer's accessible roster after auth resolves.
if (!playerIdParam) {
    $('loadingScreen').style.display = 'none';
    $('notFoundScreen').style.display = 'block';
} else {
    // 2026-06-02 — Same auth-race fix team.html got. Firebase Auth
    // rehydrates the cached signed-in session async from IndexedDB.
    // The first `onAuthStateChanged` event can fire with user=null
    // before the cache resolves; loadPlayer would then run
    // unauthenticated, every private-team read would 401, and we'd
    // dump on notFound before the real session lands. Strategy:
    //   1. Wait for either the first onAuthStateChanged event OR a
    //      2s safety timeout before kicking off loadPlayer.
    //   2. If a later auth event populates the user AFTER we already
    //      landed on notFound, retry loadPlayer.
    let authResolved = false;
    let authResolveFn = null;
    const authReady = new Promise((resolve) => {
        authResolveFn = resolve;
        setTimeout(() => {
            if (!authResolved) { authResolved = true; resolve(); }
        }, 2000);
    });
    // currentUid hoisted to module scope above
    onAuthStateChanged(auth, (user) => {
        currentUid = user ? user.uid : null;
        console.log('[player.html] auth state:', currentUid ? 'signed in (uid=' + currentUid + ')' : 'anon');
        if (!authResolved) {
            authResolved = true;
            authResolveFn && authResolveFn();
        } else if (currentUid &&
                   $('notFoundScreen').style.display === 'block') {
            // Late auth event after a failed first pass — retry.
            $('notFoundScreen').style.display = 'none';
            $('loadingScreen').style.display = 'block';
            loadPlayer();
        }
    });
    authReady.then(async () => {
        // No team= in URL → find the first team the signed-in viewer
        // can read that has this playerId in its roster. The player
        // profile (and name) isn't loaded yet, so this seed pass only
        // does exact-id matching; loadPlayer's full discovery picks
        // up sibling SavedPlayer UUIDs (cross-team identity drift)
        // via name-fallback once the profile resolves.
        if (!hubCode) {
            try {
                const seed = await seedTeamForPlayer();
                if (seed) {
                    hubCode = seed;
                    console.log('[player.html] seeded team:', seed);
                }
            } catch (e) {
                console.warn('[player.html] team seed failed:', e);
            }
        }
        if (!hubCode) {
            // Still nothing — show the sign-in CTA / not-found gate.
            showNotFound();
            return;
        }
        loadPlayer();
    });
}

// 2026-06-02 — Bare-URL seed: scan the viewer's accessible teams for
// the first one whose roster contains the URL's playerId. Used when
// the page is opened without an explicit `team=` (the apps include
// it, but a hand-typed or shared URL might not). Returns the
// hubCode of the first match, or null if none.
async function seedTeamForPlayer() {
    if (!currentUid) return null;
    const userDoc = await getDoc(doc(db, 'users', currentUid)).catch(() => null);
    if (!userDoc || !userDoc.exists()) return null;
    const data = userDoc.data() || {};
    const ownedTeamIds = Array.isArray(data.myTeams) ? data.myTeams : [];
    const subscribed = Array.isArray(data.subscribedHubs) ? data.subscribedHubs : [];
    const subTeamIds = await Promise.all(subscribed.map(async (code) => {
        try {
            const idx = await getDoc(doc(db, 'hubIndex', code));
            return idx.exists() ? idx.data().teamId : null;
        } catch (_) { return null; }
    }));
    const allTeamIds = Array.from(new Set([
        ...ownedTeamIds, ...subTeamIds.filter(Boolean),
    ]));
    for (const tid of allTeamIds) {
        try {
            const playerDoc = await getDoc(doc(db, 'teams', tid, 'players', playerIdParam))
                .catch(() => null);
            if (playerDoc?.exists()) return await resolveHubCodeForTeam(tid);
            const rosterSnap = await getDocs(collection(db, 'teams', tid, 'roster'))
                .catch(() => null);
            if (!rosterSnap) continue;
            for (const r of rosterSnap.docs) {
                if (r.id === playerIdParam) return await resolveHubCodeForTeam(tid);
                if (r.data()?.playerId === playerIdParam) return await resolveHubCodeForTeam(tid);
            }
        } catch (_) { /* try next team */ }
    }
    return null;
}

async function loadPlayer() {
    try {
        // Resolve hubCode → teamId
        const idx = await getDoc(doc(db, 'hubIndex', hubCode));
        if (!idx.exists()) {
            console.warn('[player.html] hubIndex/' + hubCode + ' does not exist');
            return showNotFound();
        }
        teamId = idx.data().teamId;
        console.log('[player.html] resolved hubCode=' + hubCode + ' -> teamId=' + teamId);

        // 2026-06-02 — Defensive player-profile resolution. The
        // teams/{teamId}/players/{id} doc is only written for TRACKED
        // players that have accumulated stats on this team. A player
        // who's only in the roster (or whose savedPlayerId differs
        // between iOS/Android installs) won't have that doc — we'd
        // dump them on "Player not found" even though we can clearly
        // resolve their name from the roster + games. Tries in order:
        //   1. teams/{teamId}/players/{playerIdParam} (canonical)
        //   2. teams/{teamId}/roster scan for matching playerId
        //   3. First participant on any team game matching the id /
        //      name (last-resort; name picked off the URL would even
        //      let us render a generic page if the player isn't on
        //      the roster yet).
        const teamDoc = await getDoc(doc(db, 'teams', teamId)).catch((err) => {
            console.warn('[player.html] team doc read failed for teamId=' + teamId + ':', err?.code, err?.message);
            return null;
        });
        if (teamDoc && teamDoc.exists()) {
            console.log('[player.html] team doc ok: name=' + (teamDoc.data().name || '?') + ' ownerUid=' + (teamDoc.data().ownerUid || '(missing)') + ' visibility=' + (teamDoc.data().hub?.visibility || '(private)'));
        } else if (teamDoc) {
            console.warn('[player.html] team doc not found at teams/' + teamId);
        }
        if (teamDoc && teamDoc.exists()) {
            const t = teamDoc.data();
            teamProfile = {
                name: t.name || '',
                sport: t.sport || '',
                color: t.color || '#1565C0',
                color2: t.color2 || '#FFFFFF',
            };
        }

        const playerDoc = await getDoc(doc(db, 'teams', teamId, 'players', playerIdParam))
            .catch(() => null);
        if (playerDoc && playerDoc.exists()) {
            playerProfile = { id: playerDoc.id, ...playerDoc.data() };
        }
        if (!playerProfile) {
            try {
                const rosterSnap = await getDocs(collection(db, 'teams', teamId, 'roster'));
                for (const r of rosterSnap.docs) {
                    const rd = r.data();
                    if (rd.playerId === playerIdParam || r.id === playerIdParam) {
                        playerProfile = {
                            id: playerIdParam,
                            name: rd.name || '',
                            number: rd.number || '',
                            position: rd.position || '',
                            sports: teamProfile?.sport ? [teamProfile.sport] : [],
                        };
                        console.log('[player.html] resolved player from roster:', playerProfile);
                        break;
                    }
                }
            } catch (e) {
                console.warn('[player.html] roster lookup failed:', e);
            }
        }
        // Note: we DON'T bail yet on missing playerProfile — the games
        // pass below can still match by playerIdParam, and if any
        // game has Eric as a participant we'll synthesize a profile
        // from the first matching participant entry below.

        // Seasons + games in parallel
        const [seasonsSnap, gamesSnap] = await Promise.all([
            getDocs(collection(db, 'teams', teamId, 'seasons')).catch(() => null),
            getDocs(collection(db, 'teams', teamId, 'games')).catch(() => null),
        ]);
        if (seasonsSnap) {
            teamSeasons = seasonsSnap.docs.map((d) => ({ id: d.id, teamId, ...d.data() }))
                .sort((a, b) => (b.startDate || 0) - (a.startDate || 0));
        }
        if (gamesSnap) {
            const lowerName = (playerProfile?.name || '').toLowerCase();
            for (const g of gamesSnap.docs) {
                const data = g.data();
                const status = data.status;
                if (status === 'scheduled' || status === 'live' || status === 'cancelled') continue;
                // Match THIS player on the participant list. Mirrors
                // the iOS/Android `loadPlayerGames` matching: savedPlayerId,
                // playerId, or case-insensitive name.
                const ps = Array.isArray(data.participants) ? data.participants : [];
                const matched = ps.find((p) =>
                    p && (p.savedPlayerId === playerIdParam
                        || p.playerId === playerIdParam
                        || (lowerName && (p.name || '').toLowerCase() === lowerName))
                );
                if (!matched) continue;
                // 2026-06-03 — Tag each game with the source hub/team
                // so the card can link straight to game.html and show
                // the team name when games come from multiple teams.
                allGames.push({
                    id: g.id, ...data,
                    _participant: matched,
                    _hubCode: hubCode || '',
                    _teamName: teamProfile?.name || '',
                });
            }
        }

        // 2026-06-02 — Last-resort player profile from the first game's
        // matched participant. Covers iOS/Android cross-install
        // playerId drift: the apps may have shipped Eric with two
        // different SavedPlayer UUIDs, but the participants in his
        // bowling sessions still carry his name, so we can render the
        // page off that.
        if (!playerProfile && allGames.length > 0) {
            const p = allGames[0]._participant;
            playerProfile = {
                id: playerIdParam,
                name: p.name || '',
                number: p.number || '',
                position: p.position || '',
                sports: [],
            };
            console.log('[player.html] synthesized player profile from game participant:', playerProfile);
        }
        if (!playerProfile) {
            console.warn('[player.html] no profile + no matching games → notFound');
            return showNotFound();
        }

        // Initial sport selection — prefer the team's sport when the
        // player only has games on this team; the page is scoped to a
        // single team for now, so all games carry the same sport.
        const sports = uniqueSportsFromGames(allGames);
        if (sports.length === 0 && teamProfile?.sport) sports.push(teamProfile.sport.toUpperCase());
        selectedSport = sports[0] || '';

        // Always discover every team the viewer can read that has
        // this player on its roster. Runs after playerProfile
        // resolves so the discovery function can match by name as a
        // fallback for cross-team SavedPlayer UUID drift.
        const discoverTeamsP = discoverTeamsForPlayer(playerProfile?.name || '').catch((e) => {
            console.warn('[player.html] team discovery failed:', e);
            return [];
        });

        renderHero();
        renderPills(sports);
        renderSeasonPicker();
        renderEverything();

        // Resolve the team list, then render the picker. We push the
        // resolved hubCodes into `teamHubCodes` so renderTeamPicker
        // can stay sync. Picker hides itself when only one option
        // is known, so single-team players see no UI delta.
        discoverTeamsP.then(async (codes) => {
            teamHubCodes.length = 0;
            for (const c of codes) teamHubCodes.push(c);
            if (hubCode && !teamHubCodes.includes(hubCode)) {
                teamHubCodes.unshift(hubCode);
            }
            console.log('[player.html] picker teams =', teamHubCodes);
            renderTeamPicker();
            // 2026-06-03 — Cross-team game gather. Pull this player's
            // games from every OTHER team they're rostered on and
            // merge into allGames so the past-games list represents
            // their full ScoreFrame history, not just the one team
            // passed in the URL. De-dups by id since the URL team's
            // games already landed in the initial pull above.
            const otherCodes = teamHubCodes.filter((c) => c !== hubCode);
            if (otherCodes.length > 0) {
                const added = await gatherCrossTeamGames(otherCodes,
                    playerProfile?.name || '');
                if (added > 0) {
                    // Sport set may have grown — refresh pills + season
                    // picker. Then full re-render so the new games
                    // appear alongside the original team's.
                    const refreshedSports = uniqueSportsFromGames(allGames);
                    renderPills(refreshedSports);
                    renderSeasonPicker();
                    renderEverything();
                }
            }
        });
        $('loadingScreen').style.display = 'none';
        $('playerPage').style.display = 'block';
    } catch (e) {
        console.error('[player.html] load failed:', e);
        showNotFound();
    }
}

function showNotFound() {
    $('loadingScreen').style.display = 'none';
    $('notFoundScreen').style.display = 'block';
    // 2026-06-02 — When the visitor is anon AND the team is private
    // (we saw a permission-denied somewhere during loadPlayer), the
    // right CTA is "sign in to view your team", not "player doesn't
    // exist". Surface the Google sign-in button when anon; hide it
    // when signed-in (in which case the page genuinely couldn't find
    // the player on this team).
    const anon = !currentUid;
    if (anon) {
        $('notFoundTitle').textContent = 'Sign in to view stats';
        $('notFoundDesc').textContent = 'This team is private. Sign in with the account that has access.';
        $('signInBtn').style.display = 'inline-block';
    } else {
        $('notFoundTitle').textContent = 'Player not found';
        $('notFoundDesc').textContent = 'This player isn\'t on this team or hasn\'t been added yet.';
        $('signInBtn').style.display = 'none';
    }
}

function uniqueSportsFromGames(games) {
    const set = new Set();
    for (const g of games) {
        const s = String(g.sport || '').toUpperCase();
        if (s) set.add(s);
    }
    return Array.from(set);
}

// 2026-06-02 — Discovery path for `teams=all`. Reads the signed-in
// user's `myTeams` + `subscribedHubs` from `users/{uid}`, resolves
// the subscribed hubCodes to teamIds via hubIndex, then checks each
// team's `players/{playerIdParam}` doc + a roster query to see if
// the player belongs to that team. Returns the matching hubCodes.
// Anon visitors get an empty list — they can only see the team
// passed in the URL.
async function discoverTeamsForPlayer(playerName) {
    if (!currentUid) return [];
    const userDoc = await getDoc(doc(db, 'users', currentUid)).catch(() => null);
    if (!userDoc || !userDoc.exists()) return [];
    const data = userDoc.data() || {};
    const ownedTeamIds = Array.isArray(data.myTeams) ? data.myTeams : [];
    const subscribed = Array.isArray(data.subscribedHubs) ? data.subscribedHubs : [];

    // Resolve subscribed hubCodes → teamIds in parallel.
    const subTeamIds = await Promise.all(subscribed.map(async (code) => {
        try {
            const idx = await getDoc(doc(db, 'hubIndex', code));
            return idx.exists() ? idx.data().teamId : null;
        } catch (_) { return null; }
    }));
    const allTeamIds = Array.from(new Set([
        ...ownedTeamIds,
        ...subTeamIds.filter(Boolean),
    ]));

    const lowerName = (playerName || '').toLowerCase().trim();
    console.log('[player.html] discovery scan', allTeamIds.length,
        'teams; matchByName=', lowerName);

    // For each team: scan the full roster client-side. We try doc-id
    // match, the doc's `playerId` field, AND a case-insensitive
    // name match. The name fallback is what catches cross-team
    // SavedPlayer UUID drift — Eric Solo may have him stored under
    // one UUID and Eric & Carter under another, but both rosters
    // carry "Eric" (or however he typed his name) so the name path
    // unifies them. The roster collection is small per team (~10s of
    // entries at most), so the full-list scan is cheap.
    const results = await Promise.all(allTeamIds.map(async (tid) => {
        try {
            // Cheapest first: try the players/{playerIdParam} doc.
            const playerDoc = await getDoc(
                doc(db, 'teams', tid, 'players', playerIdParam)
            ).catch(() => null);
            if (playerDoc?.exists()) {
                console.log('[player.html] discovery matched', tid, 'via players/{id}');
                return await resolveHubCodeForTeam(tid);
            }
            // Roster scan: handles teams that have a roster entry but
            // no `players/{id}` doc (e.g. untracked players).
            const rosterSnap = await getDocs(
                collection(db, 'teams', tid, 'roster')
            ).catch(() => null);
            if (rosterSnap) {
                for (const r of rosterSnap.docs) {
                    const rd = r.data();
                    if (r.id === playerIdParam ||
                        (rd.playerId && rd.playerId === playerIdParam)) {
                        console.log('[player.html] discovery matched', tid, 'via roster id');
                        return await resolveHubCodeForTeam(tid);
                    }
                    if (lowerName && rd.name &&
                        String(rd.name).toLowerCase().trim() === lowerName) {
                        console.log('[player.html] discovery matched', tid, 'via roster name');
                        return await resolveHubCodeForTeam(tid);
                    }
                }
            }
            // Tracked-players scan: catches cross-team SavedPlayer UUID
            // drift when the roster entry doesn't carry a `name` field
            // but the team's `players/{savedPlayerId}` doc does. Small
            // collection (tracked players only), cheap to enumerate.
            if (lowerName) {
                const playersSnap = await getDocs(
                    collection(db, 'teams', tid, 'players')
                ).catch(() => null);
                if (playersSnap) {
                    for (const p of playersSnap.docs) {
                        const pd = p.data();
                        if (pd.name &&
                            String(pd.name).toLowerCase().trim() === lowerName) {
                            console.log('[player.html] discovery matched', tid,
                                'via players name (id=', p.id, ')');
                            return await resolveHubCodeForTeam(tid);
                        }
                    }
                }
            }
            return null;
        } catch (e) {
            console.warn('[player.html] discovery error for', tid, e);
            return null;
        }
    }));
    const codes = results.filter(Boolean);
    console.log('[player.html] discovery done, found', codes.length, 'teams:', codes);
    return codes;
}

async function resolveHubCodeForTeam(tid) {
    try {
        const teamDoc = await getDoc(doc(db, 'teams', tid));
        const hc = teamDoc?.data()?.hub?.hubCode;
        return hc || null;
    } catch (_) { return null; }
}

// 2026-06-03 — Pull this player's games from each `hubCode` in the
// list, dedup by game id (so the initial team's games don't get
// duplicated when included), and append matches to `allGames`. Tags
// each appended game with `_hubCode` and `_teamName` so the past-
// games card can link to the right `game.html?team=&game=` and
// display the team source. Returns the number of games appended.
async function gatherCrossTeamGames(hubCodes, playerName) {
    const lowerName = (playerName || '').toLowerCase().trim();
    const existingIds = new Set(allGames.map((g) => g.id));
    let added = 0;
    for (const code of hubCodes) {
        if (!code) continue;
        try {
            const idx = await getDoc(doc(db, 'hubIndex', code));
            if (!idx.exists()) continue;
            const tid = idx.data().teamId;
            const td = await getDoc(doc(db, 'teams', tid)).catch(() => null);
            const tname = td?.data()?.name || '';
            const gs = await getDocs(collection(db, 'teams', tid, 'games'))
                .catch(() => null);
            if (!gs) continue;
            for (const g of gs.docs) {
                if (existingIds.has(g.id)) continue;
                const data = g.data();
                const status = data.status;
                if (status === 'scheduled' || status === 'live' || status === 'cancelled') continue;
                const ps = Array.isArray(data.participants) ? data.participants : [];
                const matched = ps.find((p) =>
                    p && (p.savedPlayerId === playerIdParam
                        || p.playerId === playerIdParam
                        || (lowerName && (p.name || '').toLowerCase() === lowerName))
                );
                if (!matched) continue;
                allGames.push({
                    id: g.id, ...data,
                    _participant: matched,
                    _hubCode: code,
                    _teamName: tname,
                });
                existingIds.add(g.id);
                added++;
            }
        } catch (e) {
            console.warn('[player.html] cross-team gather failed for', code, e);
        }
    }
    console.log('[player.html] cross-team gather added', added, 'games');
    return added;
}

// 2026-06-02 — Resolve each hubCode in `teamHubCodes` to a team name
// for the picker. Hides the section when only one option is known —
// no picker UI needed for single-team scope. Switching the picker
// reloads the page with the new `team=` pinned + preserves the
// existing `teams=` list and other URL params (theme, app, etc.).
async function renderTeamPicker() {
    const section = $('teamSection');
    const sel = $('teamSelect');
    const status = $('teamDiscoveryStatus');
    // Always show the section after discovery — even with 1 team — so
    // the user has visible feedback that discovery ran. If discovery
    // missed a team Eric expects to see, this surfaces the gap
    // instead of silently hiding the picker.
    section.style.display = 'block';
    if (teamHubCodes.length <= 1) {
        sel.style.display = 'none';
        if (currentUid) {
            status.textContent = 'Only one team found for this player on your account. ' +
                '(Other teams may not have synced this player to the cloud yet.)';
        } else {
            status.textContent = 'Sign in to see this player on all your teams.';
        }
        return;
    }
    sel.style.display = '';
    status.textContent = `${teamHubCodes.length} teams found.`;
    // Resolve hubCode → teamName via hubIndex → teams/{teamId}.
    // Slow on first paint but cached after; for now we accept the
    // round-trip since the picker is rare.
    const options = [];
    for (const code of teamHubCodes) {
        let label = code;
        try {
            const idx = await getDoc(doc(db, 'hubIndex', code));
            if (idx.exists()) {
                const tid = idx.data().teamId;
                const td = await getDoc(doc(db, 'teams', tid));
                if (td.exists()) {
                    const n = td.data().name;
                    if (n) label = n;
                }
            }
        } catch (e) {
            console.warn('[player.html] team-name lookup failed for', code, e);
        }
        options.push({ code, label });
    }
    section.style.display = 'block';
    sel.innerHTML = options
        .map((o) => `<option value="${o.code}">${o.label}</option>`)
        .join('');
    sel.value = hubCode;
    sel.onchange = () => {
        const next = sel.value;
        if (!next || next === hubCode) return;
        // Rebuild the URL with the new `team=` pinned. Keep the rest
        // (player, teams, theme, app) intact so context preserves.
        const url = new URL(location.href);
        url.searchParams.set('team', next);
        location.href = url.toString();
    };
}

function renderHero() {
    $('heroWatermark').textContent = sportEmoji(selectedSport);
    $('heroName').textContent = playerProfile.name || 'Player';
    const bits = [];
    if (playerProfile.number) bits.push('#' + playerProfile.number);
    if (playerProfile.position) bits.push(playerProfile.position);
    if (teamProfile?.name) bits.push(teamProfile.name);
    $('heroMeta').textContent = bits.join('  ·  ');
    document.title = `${playerProfile.name || 'Player'} — ScoreFrame`;
}

function renderPills(sports) {
    const row = $('pillsRow');
    if (sports.length <= 1) {
        row.parentElement.style.display = 'none';
        return;
    }
    row.parentElement.style.display = 'block';
    row.innerHTML = '';
    for (const s of sports) {
        const b = document.createElement('button');
        b.className = 'pill' + (s === selectedSport ? ' selected' : '');
        b.innerHTML = `${sportEmoji(s)} ${sportLabel(s)}`;
        b.onclick = () => {
            if (selectedSport === s) return;
            selectedSport = s;
            selectedSeasonId = '__ALL__';
            renderHero();
            renderPills(sports);
            renderSeasonPicker();
            renderEverything();
        };
        row.appendChild(b);
    }
}

function renderSeasonPicker() {
    // Only seasons that have at least one game in the current sport.
    const sportGames = sportFilteredGames();
    const idsInSport = new Set(sportGames.map((g) => g.seasonId).filter((x) => !!x));
    const scoped = teamSeasons.filter((s) => idsInSport.has(s.id));
    const hasPreSeason = sportGames.some((g) => !g.seasonId);

    const sel = $('seasonSelect');
    const section = $('seasonSection');
    if (scoped.length === 0 && !hasPreSeason) {
        section.style.display = 'none';
        return;
    }
    section.style.display = 'block';
    sel.innerHTML = '';
    const all = document.createElement('option');
    all.value = '__ALL__';
    all.textContent = 'All Seasons';
    sel.appendChild(all);
    for (const s of scoped) {
        const opt = document.createElement('option');
        opt.value = s.id;
        const baseName = s.name || 'Season';
        // Pull the team name into the label so a player on multiple
        // team-seasons in the same sport can tell them apart.
        const teamName = teamProfile?.name || '';
        opt.textContent = teamName ? `${baseName} — ${teamName}` : baseName;
        sel.appendChild(opt);
    }
    if (hasPreSeason) {
        const opt = document.createElement('option');
        opt.value = '__NONE__';
        opt.textContent = '(Pre-Seasons)';
        sel.appendChild(opt);
    }
    sel.value = selectedSeasonId;
    sel.onchange = () => {
        selectedSeasonId = sel.value;
        renderEverything();
    };
    // Hide the picker when only "All Seasons" would render — nothing to pick.
    if (sel.options.length <= 1) section.style.display = 'none';
}

function sportFilteredGames() {
    if (!selectedSport) return allGames;
    return allGames.filter((g) => String(g.sport || '').toUpperCase() === selectedSport);
}

function filteredGames() {
    const games = sportFilteredGames();
    if (selectedSeasonId === '__ALL__') return games;
    if (selectedSeasonId === '__NONE__') return games.filter((g) => !g.seasonId);
    return games.filter((g) => g.seasonId === selectedSeasonId);
}

function renderEverything() {
    renderStatCard();
    renderTrend();
    renderGameList();
}

// ── Per-game-score extraction (priority chain — Android/iOS parity) ──
function bowlingScoresForGame(g) {
    const p = g._participant || {};
    const stats = p.stats || {};
    // 1. game1..N keys (iOS-native + Android via coerceNumericStats splatting)
    const keyed = [];
    let i = 1;
    while (true) {
        const v = stats['game' + i];
        if (typeof v !== 'number' || v <= 0) break;
        keyed.push(v);
        i++;
    }
    if (keyed.length) return keyed;
    // 2. Android's raw individualGameScores array
    if (Array.isArray(stats.individualGameScores)) {
        const arr = stats.individualGameScores
            .filter((x) => typeof x === 'number' && x > 0);
        if (arr.length) return arr;
    }
    // 3. playerScores string fallback: "Name:g1,g2,g3:series;..."
    // 2026-06-02 — Some sessions carry this at the TOP level of the
    // GameSummary doc; others nest it inside `sportSpecificStats`
    // depending on save vintage. Android's tryFindPlayerScoresOnSummary
    // checks both — mirror that here. Without the sport-stats lookup
    // we'd silently miss every older bowling session and revert to
    // the seriesTotal estimate.
    const ps = g.playerScores
        || (g.sportSpecificStats && g.sportSpecificStats.playerScores)
        || '';
    if (typeof ps === 'string' && ps && p.name) {
        const lower = p.name.toLowerCase();
        for (const chunk of ps.split(';')) {
            const parts = chunk.split(':');
            if (parts.length < 2) continue;
            if (parts[0].trim().toLowerCase() !== lower) continue;
            const arr = parts[1].split(',')
                .map((x) => parseInt(x.trim(), 10))
                .filter((x) => !isNaN(x) && x > 0);
            if (arr.length) return arr;
            break;
        }
    }
    // 4. seriesTotal/games estimate
    const series = stats.seriesTotal || 0;
    const gc = stats.games || 0;
    if (series > 0 && gc > 0) {
        const per = Math.round(series / gc);
        return new Array(gc).fill(per);
    }
    // 5. single score (one-game session)
    const score = stats.score || 0;
    return score > 0 ? [score] : [];
}

function renderStatCard() {
    const games = filteredGames().filter((g) => g.countTowardStats !== false);
    const slot = $('statCardSlot');
    if (games.length === 0) {
        slot.innerHTML = `
            <div class="center-state" style="padding: 32px 24px;">
                <div class="h">No stats recorded yet</div>
                <div class="d">Once games are played, the summary lands here.</div>
            </div>`;
        return;
    }
    const sportU = (selectedSport || '').toUpperCase();
    const emoji = sportEmoji(sportU);
    const playerName = (playerProfile.name || 'PLAYER').toUpperCase();

    let body = '';
    if (sportU === 'BOWLING') {
        body = renderBowlingBody(games);
    } else if (sportU === 'BASKETBALL') {
        body = renderBasketballBody(games);
    } else if (sportU === 'VOLLEYBALL') {
        body = renderVolleyballBody(games);
    } else if (sportU === 'BASEBALL' || sportU === 'SOFTBALL') {
        body = renderBattingBody(games);
    } else {
        body = renderGenericBody(games);
    }
    slot.innerHTML = `
        <div class="stat-card">
            <div class="stat-card-head">
                <div class="emoji">${emoji}</div>
                <div>
                    <div class="who">${playerName}</div>
                    <div class="games">${games.length} session${games.length === 1 ? '' : 's'}</div>
                </div>
            </div>
            <div class="stat-divider"></div>
            ${body}
        </div>`;
}

function renderBowlingBody(games) {
    let totalPins = 0, gamesPlayed = 0, high = 0;
    let strikes = 0, spares = 0, opens = 0, splits = 0, splitConv = 0, frames = 0;
    for (const g of games) {
        for (const s of bowlingScoresForGame(g)) {
            gamesPlayed++; totalPins += s; if (s > high) high = s;
        }
        const ps = (g._participant && g._participant.stats) || {};
        strikes += ps.strikes || 0;
        spares += ps.spares || 0;
        opens += ps.openFrames || 0;
        splits += ps.splits || 0;
        splitConv += ps.splitConversions || 0;
        frames += ps.totalFrames || 0;
    }
    const avg = gamesPlayed > 0 ? (totalPins / gamesPlayed).toFixed(1) : '—';
    let body = `
        <div class="big-row">
            <div class="big-stat"><span class="v">${avg}</span><span class="l">AVG</span></div>
            <div class="big-stat"><span class="v">${high || '—'}</span><span class="l">HIGH</span></div>
            <div class="big-stat"><span class="v">${totalPins || '—'}</span><span class="l">PINS</span></div>
        </div>`;
    if (frames > 0) {
        const strikePct = ((strikes / frames) * 100).toFixed(0) + '%';
        const sparePct = ((spares / frames) * 100).toFixed(0) + '%';
        const openPct = ((opens / frames) * 100).toFixed(0) + '%';
        body += `
            <div class="stat-grid cols-3" style="margin-top:14px;">
                <div class="stat-cell"><span class="v">${strikes} (${strikePct})</span><span class="l">STRIKES</span></div>
                <div class="stat-cell"><span class="v">${spares} (${sparePct})</span><span class="l">SPARES</span></div>
                <div class="stat-cell"><span class="v">${opens} (${openPct})</span><span class="l">OPEN</span></div>
            </div>`;
        if (splits > 0) {
            const convPct = ((splitConv / splits) * 100).toFixed(0) + '%';
            body += `
                <div class="stat-grid cols-3" style="margin-top:8px;">
                    <div class="stat-cell"><span class="v">${splitConv}/${splits}</span><span class="l">SPLITS</span></div>
                    <div class="stat-cell"><span class="v">${convPct}</span><span class="l">CONVERT</span></div>
                    <div class="stat-cell"><span class="v">${frames}</span><span class="l">FRAMES</span></div>
                </div>`;
        }
    }
    return body;
}

function renderBasketballBody(games) {
    let pts = 0, twoM = 0, twoA = 0, threeM = 0, threeA = 0, ftM = 0, ftA = 0;
    let oreb = 0, dreb = 0, ast = 0, stl = 0, blk = 0, to = 0, pf = 0;
    let wins = 0, losses = 0;
    for (const g of games) {
        const s = (g._participant && g._participant.stats) || {};
        pts += s.PTS || 0;
        twoM += s['2PM'] || 0; twoA += s['2PA'] || 0;
        threeM += s['3PM'] || 0; threeA += s['3PA'] || 0;
        ftM += s.FTM || 0; ftA += s.FTA || 0;
        oreb += s.OREB || 0; dreb += s.DREB || 0;
        ast += s.AST || 0; stl += s.STL || 0; blk += s.BLK || 0;
        to += s.TO || 0; pf += s.PF || 0;
        // W-L based on side + scores
        const side = g._participant.side;
        if (side === 'home' && (g.homeScore || 0) > (g.awayScore || 0)) wins++;
        else if (side === 'away' && (g.awayScore || 0) > (g.homeScore || 0)) wins++;
        else if ((g.homeScore || 0) !== (g.awayScore || 0)) losses++;
    }
    const ppg = (pts / games.length).toFixed(1);
    const reb = oreb + dreb;
    const pct = (m, a) => a > 0 ? ((m / a) * 100).toFixed(0) + '%' : '—';
    let body = `
        <div class="big-row">
            <div class="big-stat"><span class="v">${ppg}</span><span class="l">PPG</span></div>
            <div class="big-stat"><span class="v">${reb}</span><span class="l">REB</span></div>
            <div class="big-stat"><span class="v">${ast}</span><span class="l">AST</span></div>
        </div>
        <div class="stat-grid cols-6" style="margin-top:14px;">
            <div class="stat-cell"><span class="v">${twoM}/${twoA}</span><span class="l">2P</span></div>
            <div class="stat-cell"><span class="v">${pct(twoM, twoA)}</span><span class="l">2P%</span></div>
            <div class="stat-cell"><span class="v">${threeM}/${threeA}</span><span class="l">3P</span></div>
            <div class="stat-cell"><span class="v">${pct(threeM, threeA)}</span><span class="l">3P%</span></div>
            <div class="stat-cell"><span class="v">${ftM}/${ftA}</span><span class="l">FT</span></div>
            <div class="stat-cell"><span class="v">${pct(ftM, ftA)}</span><span class="l">FT%</span></div>
        </div>
        <div class="stat-grid cols-6" style="margin-top:8px;">
            <div class="stat-cell"><span class="v">${oreb}</span><span class="l">OREB</span></div>
            <div class="stat-cell"><span class="v">${dreb}</span><span class="l">DREB</span></div>
            <div class="stat-cell"><span class="v">${stl}</span><span class="l">STL</span></div>
            <div class="stat-cell"><span class="v">${blk}</span><span class="l">BLK</span></div>
            <div class="stat-cell"><span class="v">${to}</span><span class="l">TO</span></div>
            <div class="stat-cell"><span class="v">${pf}</span><span class="l">PF</span></div>
        </div>`;
    if (wins > 0 || losses > 0) {
        body += `
            <div class="record-row">
                <span class="l">RECORD</span>
                <span class="v">${wins}W-${losses}L</span>
            </div>`;
    }
    return body;
}

function renderVolleyballBody(games) {
    let kills = 0, aces = 0, assists = 0, errors = 0, missedServes = 0;
    let wins = 0, losses = 0;
    for (const g of games) {
        const s = (g._participant && g._participant.stats) || {};
        kills += s.kills || 0; aces += s.aces || 0; assists += s.assists || 0;
        errors += s.errors || 0; missedServes += s.missedServes || 0;
        const side = g._participant.side;
        if (side === 'home' && (g.homeScore || 0) > (g.awayScore || 0)) wins++;
        else if (side === 'away' && (g.awayScore || 0) > (g.homeScore || 0)) wins++;
        else if ((g.homeScore || 0) !== (g.awayScore || 0)) losses++;
    }
    const n = games.length;
    const kpg = (kills / n).toFixed(1), apg = (aces / n).toFixed(1), astpg = (assists / n).toFixed(1);
    return `
        <div class="big-row">
            <div class="big-stat"><span class="v">${kpg}</span><span class="l">K/G</span></div>
            <div class="big-stat"><span class="v">${apg}</span><span class="l">A/G</span></div>
            <div class="big-stat"><span class="v">${astpg}</span><span class="l">AST/G</span></div>
        </div>
        <div class="stat-grid cols-3" style="margin-top:14px;">
            <div class="stat-cell"><span class="v">${kills}</span><span class="l">KILLS</span></div>
            <div class="stat-cell"><span class="v">${aces}</span><span class="l">ACES</span></div>
            <div class="stat-cell"><span class="v">${assists}</span><span class="l">ASTS</span></div>
        </div>
        ${(wins > 0 || losses > 0) ? `
            <div class="record-row">
                <span class="l">RECORD</span>
                <span class="v">${wins}W-${losses}L</span>
            </div>` : ''}`;
}

function renderBattingBody(games) {
    let ab = 0, hits = 0, rbi = 0, hr = 0, runs = 0, bb = 0, k = 0;
    for (const g of games) {
        const s = (g._participant && g._participant.stats) || {};
        ab += s.AB || 0; hits += s.hits || s.H || 0;
        rbi += s.RBI || 0; hr += s.HR || 0;
        runs += s.runs || s.R || 0; bb += s.BB || 0; k += s.K || 0;
    }
    const avg = ab > 0 ? (hits / ab).toFixed(3).replace(/^0/, '') : '—';
    return `
        <div class="big-row">
            <div class="big-stat"><span class="v">${avg}</span><span class="l">AVG</span></div>
            <div class="big-stat"><span class="v">${hits}/${ab}</span><span class="l">H/AB</span></div>
            <div class="big-stat"><span class="v">${rbi}</span><span class="l">RBI</span></div>
        </div>
        <div class="stat-grid cols-3" style="margin-top:14px;">
            <div class="stat-cell"><span class="v">${hr}</span><span class="l">HR</span></div>
            <div class="stat-cell"><span class="v">${runs}</span><span class="l">R</span></div>
            <div class="stat-cell"><span class="v">${bb}/${k}</span><span class="l">BB/K</span></div>
        </div>`;
}

function renderGenericBody(games) {
    let wins = 0, losses = 0;
    for (const g of games) {
        const side = g._participant.side;
        if (side === 'home' && (g.homeScore || 0) > (g.awayScore || 0)) wins++;
        else if (side === 'away' && (g.awayScore || 0) > (g.homeScore || 0)) wins++;
        else if ((g.homeScore || 0) !== (g.awayScore || 0)) losses++;
    }
    const total = wins + losses;
    const winPct = total > 0 ? ((wins / total) * 100).toFixed(0) + '%' : '—';
    return `
        <div class="big-row">
            <div class="big-stat"><span class="v">${games.length}</span><span class="l">GAMES</span></div>
            <div class="big-stat"><span class="v">${wins}-${losses}</span><span class="l">W-L</span></div>
            <div class="big-stat"><span class="v">${winPct}</span><span class="l">WIN%</span></div>
        </div>`;
}

// ── Trend chart (bowling) ──
function renderTrend() {
    const slot = $('trendSlot');
    const loadingEl = $('trendLoading');
    if ((selectedSport || '').toUpperCase() !== 'BOWLING') {
        slot.style.display = 'none';
        return;
    }
    // Reveal the slot immediately with the "Calculating…" overlay so
    // the user sees something land instead of a blank gap while the
    // per-game extraction runs. Two-frame defer keeps the overlay
    // painted BEFORE the heavier draw work runs.
    slot.style.display = 'block';
    if (loadingEl) loadingEl.classList.remove('hidden');

    requestAnimationFrame(() => requestAnimationFrame(() => {
        const games = filteredGames().filter((g) => g.countTowardStats !== false);
        const points = [];
        for (const g of games) {
            for (const s of bowlingScoresForGame(g)) {
                points.push({ d: g.date || 0, s });
            }
        }
        points.sort((a, b) => a.d - b.d);
        if (points.length < 2) {
            slot.style.display = 'none';
            return;
        }
        const scores = points.map((p) => p.s);
        const high = Math.max(...scores);
        const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
        $('trendHigh').textContent = `High ${high}`;
        $('trendAvg').textContent = `Avg ${avg}`;
        $('trendGameCount').textContent = `${scores.length} games`;
        drawTrend(scores);
        if (loadingEl) loadingEl.classList.add('hidden');
    }));
}

function drawTrend(scores) {
    const c = $('trendCanvas');
    const dpr = window.devicePixelRatio || 1;
    const w = c.clientWidth, h = c.clientHeight;
    c.width = w * dpr; c.height = h * dpr;
    const ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);
    const minV = Math.max(0, Math.min(...scores) - 10);
    const maxV = Math.max(...scores) + 10;
    const range = Math.max(1, maxV - minV);
    const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#FF9640';
    const muted = getComputedStyle(document.body).getPropertyValue('--text-secondary').trim() || '#999';
    const stepX = w / Math.max(1, scores.length - 1);
    const yFor = (v) => h - ((v - minV) / range) * h;

    // Dashed average baseline. 2026-06-02 — Use globalAlpha for the
    // 60% transparency instead of string-concatenating a hex alpha
    // (`muted + '99'` produced "#99999" → 5-char invalid hex →
    // canvas fell back to black on the dark theme; user couldn't
    // see the average line at all).
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.setLineDash([4, 4]); ctx.lineWidth = 1; ctx.strokeStyle = muted;
    ctx.moveTo(0, yFor(avg)); ctx.lineTo(w, yFor(avg)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Trend line
    ctx.beginPath();
    ctx.lineWidth = 2; ctx.strokeStyle = accent;
    scores.forEach((s, i) => {
        const x = i * stepX, y = yFor(s);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Dots
    ctx.fillStyle = accent;
    scores.forEach((s, i) => {
        const x = i * stepX, y = yFor(s);
        ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI * 2); ctx.fill();
    });
}

// ── Game list (read-only) ──
function renderGameList() {
    const list = $('gamesList');
    const games = filteredGames().slice().sort((a, b) => (b.date || 0) - (a.date || 0));
    if (games.length === 0) {
        list.innerHTML = '<div class="center-state"><div class="d">No games for this sport yet.</div></div>';
        return;
    }
    list.innerHTML = '';
    for (const g of games) {
        list.appendChild(buildPastCard(g));
    }
}

function buildPastCard(g) {
    // 2026-06-03 — Past-game card now navigates to game.html when
    // the source team's hubCode is known. Renders as an <a> so
    // browser native cmd-click / right-click open in new tab work.
    // Falls back to a plain div when there's no hubCode (e.g.
    // legacy data where the team has no hub set).
    const href = g._hubCode
        ? `/game.html?team=${encodeURIComponent(g._hubCode)}&game=${encodeURIComponent(g.id)}`
        : '';
    const card = document.createElement(href ? 'a' : 'div');
    card.className = 'past-card' + (g.countTowardStats === false ? ' muted' : '');
    if (href) {
        card.href = href;
        card.style.textDecoration = 'none';
        card.style.color = 'inherit';
        card.style.cursor = 'pointer';
    }
    const emoji = sportEmoji(g.sport);
    const dateLabel = g.date ? new Date(g.date).toLocaleDateString(undefined,
        { weekday: 'short', month: 'short', day: 'numeric' }) : 'TBD';

    let title = '';
    const sportU = String(g.sport || '').toUpperCase();
    if (sportU === 'BOWLING') {
        const series = bowlingScoresForGame(g).reduce((a, b) => a + b, 0);
        const event = (g.sportSpecificStats && g.sportSpecificStats.eventName) || g.eventLabel || '';
        title = event
            ? `${event} · <span style="color:var(--accent);font-weight:800;">${series || '—'}</span>`
            : `Bowling · <span style="color:var(--accent);font-weight:800;">${series || '—'}</span>`;
    } else {
        const home = g.homeTeam || '';
        const away = g.awayTeam || '';
        title = `${home} ${g.homeScore || 0} – ${g.awayScore || 0} ${away}`;
    }

    let badge = '';
    if (sportU !== 'BOWLING' && g._participant) {
        const side = g._participant.side;
        const won = (side === 'home' && (g.homeScore || 0) > (g.awayScore || 0))
            || (side === 'away' && (g.awayScore || 0) > (g.homeScore || 0));
        const tie = (g.homeScore || 0) === (g.awayScore || 0);
        const letter = tie ? 'T' : (won ? 'W' : 'L');
        badge = `<div class="badge ${letter}">${letter}</div>`;
    }

    const notCounted = g.countTowardStats === false
        ? '<span class="not-counted-pill">⊘ NOT COUNTED</span>' : '';

    // 2026-06-03 — Surface the source team when this player has games
    // on multiple teams so the user can tell which team each game
    // belongs to without opening it.
    const teamSuffix = (g._teamName && teamHubCodes.length > 1)
        ? ` · ${escapeHtml(g._teamName)}`
        : '';

    card.innerHTML = `
        <div class="emoji">${emoji}</div>
        <div class="body">
            <div class="title">${title}${notCounted}</div>
            <div class="sub">${dateLabel} · ${sportLabel(g.sport || 'Game')}${teamSuffix}</div>
        </div>
        ${badge}`;
    return card;
}

function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
}

// Re-render the trend chart on resize so the canvas matches the new width.
let resizeRaf = 0;
window.addEventListener('resize', () => {
    cancelAnimationFrame(resizeRaf);
    resizeRaf = requestAnimationFrame(() => {
        if ((selectedSport || '').toUpperCase() === 'BOWLING') renderTrend();
    });
});
</script>
